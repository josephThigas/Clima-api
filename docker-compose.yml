version: '3.9'

services:
  api:
    container_name: clima_api
    build:
      context: ./
      dockerfile: ./Dockerfile
    ports:
      -  "8080:8080"
    environment:
      - API.KEY.ID=${OPENWEATHER_KEY}
      - API.KEY.GEMINI=${API-KEY-GOOGLE-GEMINI}
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/clima_api
      - SPRING_DATASOURCE_USERNAME=clima_api
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.MariaDBDialect
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512M
        reservations:
          memory: 256M
          cpus: 0.5
    depends_on:
      db :
        condition: service_healthy
  db:
    image: mariadb:latest
    container_name: data_base_clima_api
    restart: always
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512M
        reservations:
          memory: 128M
          cpus: 0.5
    environment:
      - MARIADB_ALLOW_EMPTY_ROOT_PASSWORD=true
      - MARIADB_USER=clima_api
      - MARIADB_PASSWORD=root
      - MARIADB_DATABASE=clima_api
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - mariadb-vol:/var/lib/mysql
volumes:
  mariadb-vol:
